name: Docker Publish

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - crate: feature-toggle-backend
            image: flux-gate-backend
            platform: linux/amd64
          - crate: feature-toggle-backend
            image: flux-gate-backend
            platform: linux/arm64
          - crate: feature-edge-server
            image: flux-gate-edge
            platform: linux/amd64
          - crate: feature-edge-server
            image: flux-gate-edge
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image }} (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.crate }}/Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.crate }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.crate }}-${{ matrix.platform }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}

  create-manifest:
    runs-on: ubuntu-latest
    needs: docker
    strategy:
      matrix:
        image: [flux-gate-backend, flux-gate-edge]
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest for latest
        run: |
          docker manifest create ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest \
            --amend ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest-amd64 \
            --amend ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest-arm64
          docker manifest push ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest

      - name: Create and push manifest for SHA
        run: |
          docker manifest create ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }} \
            --amend ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}-amd64 \
            --amend ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}-arm64
          docker manifest push ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
