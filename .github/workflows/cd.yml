name: CD

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: local123
          POSTGRES_DB: feature_toggle

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get Postgres container ID
        id: postgres_container_id
        run: echo "POSTGRES_CONTAINER_ID=$(docker ps --filter 'ancestor=postgres:latest' -q)" >> $GITHUB_ENV

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Run database migrations
        working-directory: ./feature-toggle-backend
        run: sqlx migrate run --database-url postgres://postgres:local123@localhost:5432/feature_toggle

      - name: Copy SQL to the container
        run: docker cp ./init.sql ${{ env.POSTGRES_CONTAINER_ID }}:/init.sql

      - name: Execute SQL script
        run: docker exec ${{ env.POSTGRES_CONTAINER_ID }} psql -U postgres -d feature_toggle -f /init.sql

      - name: Build
        env:
          DATABASE_URL: postgres://postgres:local123@localhost:5432/feature_toggle
        run: cargo build --release --verbose

      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:local123@localhost:5432/feature_toggle
        run: cargo test --verbose

      - name: Create artifact directory
        run: mkdir -p artifacts

      - name: Copy binary to artifacts
        run: |
          cp target/release/feature-toggle-backend artifacts/
          cp -r feature-toggle-backend/migrations artifacts/
          cp init.sql artifacts/
          cp Dockerfile artifacts/
          cp docker-compose.yml artifacts/
          tar -czvf feature-toggle-release.tar.gz artifacts/

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./feature-toggle-release.tar.gz
          asset_name: feature-toggle-release.tar.gz
          asset_content_type: application/gzip
