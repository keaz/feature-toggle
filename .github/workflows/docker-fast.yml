
name: Docker Publish (Fast - AMD64 Only)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - crate: feature-toggle-backend
            image: flux-gate-backend
          - crate: feature-edge-server
            image: flux-gate-edge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: Extract tag name
        id: extract_tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "TAG_NAME=latest-dev" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.image }} (AMD64 only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.crate }}/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.crate }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.crate }}-amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ steps.extract_tag.outputs.TAG_NAME }}
