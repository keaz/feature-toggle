syntax = "proto3";

package featuretoggle;

message Context {
  string key = 1;
  string value = 2;
}

message EvaluateRequest {
  // Key of the feature (unique feature key), matching FeatureEvaluationContext.feature
  string feature_key = 1;
  // environment identifier (UUID as string), matching FeatureEvaluationContext.environment_id
  string environment_id = 2;
  // evaluation context key/values, matching FeatureEvaluationContext.context
  repeated Context context = 3;
  // Deprecated: legacy identifier retained temporarily for migration; do not use
  string feature_id = 4 [deprecated = true];
  // Client making the request; used to derive team for feature lookup
  string client_id = 5;
  string client_secret = 6;
}

message EvaluateResponse {
  bool enabled = 1;
}

// New request to retrieve a full feature by its key
message GetFeatureByKeyRequest {
  string feature_key = 1;
  string client_id = 2;
  string client_secret = 3;
}

// Compound rule condition within a rule group
message RuleCondition {
  string id = 1;
  string context_key = 2;
  string operator = 3; // Comparison operator (EQUALS, IN, GREATER_THAN, etc.)
  string value = 4; // JSON-encoded value to compare against
  int32 order_index = 5; // Display order within the group
}

// Rule group combining multiple conditions with AND/OR logic
message RuleGroup {
  string id = 1;
  string logic_operator = 2; // "AND" or "OR"
  repeated RuleCondition conditions = 3;
}

// Variant allocation for weighted traffic splits
// Distributes traffic across multiple variants with percentage weights
message VariantAllocation {
  string variant_control = 1; // Variant name (must match a variant in the feature)
  int32 weight = 2; // Weight percentage (0-100). Total across all allocations should equal 100
}

message StageCriterionFull {
  string id = 1;
  string stage_id = 2;
  int32 priority = 3; // Evaluation priority (lower values evaluated first)
  repeated RuleGroup rule_groups = 4; // Compound rules for advanced targeting
  repeated VariantAllocation variant_allocations = 5; // Weighted variant allocations (overrides serve field when present)
}

message FeatureStageFull {
  string id = 1;
  string environment_id = 2;
  int32 order_index = 3;
  string position = 4;
  bool enabled = 5;
  string bucketing_key = 6;
  repeated StageCriterionFull criterias = 7;
}

message FeatureDependencyFull {
  string feature_id = 1;
  string depends_on_id = 2;
}

message FeatureVariant {
  string control = 1; // Variant name/identifier (e.g., "treatment", "control")
  string value = 2; // JSON-encoded variant value (can be string, number, bool, or JSON object)
}

message FeatureFull {
  string id = 1;
  string key = 2;
  string description = 3;
  string feature_type = 4;
  string team_id = 5;
  string created_at = 6;
  bool kill_switch_enabled = 7;
  string kill_switch_activated_at = 8; // ISO 8601 timestamp or empty
  string rollback_scheduled_at = 9; // ISO 8601 timestamp or empty
  repeated FeatureStageFull stages = 10;
  repeated FeatureDependencyFull dependencies = 11;
  bool active = 12;
  repeated FeatureVariant variants = 13; // Available variants for this feature
}

message GetFeatureByKeyResponse {
  FeatureFull feature = 1;
}

// Streaming definitions for sidecar cache sync
message SubscribeRequest {
  string client_id = 1;
  string client_secret = 2;
  // optional: filter features by keys; if empty -> all team features
  repeated string feature_keys = 3;
  // optional environment scoping for snapshot
  string environment_id = 4;
}

message Ack { string message_id = 1; }
message Heartbeat { int64 ts_unix_ms = 1; }

message StreamRequest {
  oneof payload {
    SubscribeRequest subscribe = 1;
    Ack ack = 2;
    Heartbeat heartbeat = 3;
  }
}

message FeatureUpdate {
  string message_id = 1;
  enum Action { UPSERT = 0; DELETE = 1; SNAPSHOT = 2; HEARTBEAT = 3; ERROR = 4; }
  Action action = 2;
  FeatureFull feature = 3; // used for UPSERT/SNAPSHOT
  string feature_key = 4;  // used for DELETE
  string error = 5;        // used for ERROR
}

message UserFlagAssignment {
  string user_id = 1;
  string feature_id = 2; // UUID as string
  string environment_id = 3; // UUID as string
  bool assigned = 4; // true when evaluated true
  // include client credentials for auth on the stream (ignored in responses)
  string client_id = 5;
  string client_secret = 6;
  string variant = 7; // Optional variant name that was served
}

message ListUserFlagAssignmentsRequest {
  string client_id = 1;
  string client_secret = 2;
  // optional filters
  string environment_id = 3; // if empty -> all
  string feature_id = 4; // if empty -> all
}

message ListUserFlagAssignmentsResponse {
  repeated UserFlagAssignment assignments = 1;
}

// Feature evaluation event for tracking and analytics
message FeatureEvaluationEvent {
  string feature_key = 1;
  string environment_id = 2;
  string client_id = 3;
  string client_secret = 4; // for authentication
  bool evaluation_result = 5;
  repeated Context evaluation_context = 6; // the context used during evaluation
  string user_context = 7; // extracted user identifier for easier querying
  int64 evaluated_at_unix_ms = 8; // timestamp when evaluation occurred
  bool prior_assignment = 9; // true if this was a cached/sticky assignment, false for fresh evaluation
  string variant = 10; // Optional variant name that was served (e.g., "control", "treatment")
  string variant_value = 11; // Optional variant value as JSON string (e.g., '{"color": "blue"}', '42', 'true')
}

// Request message for pushing evaluation events
message PushEvaluationEventsRequest {
  repeated FeatureEvaluationEvent events = 1;
}

// Response acknowledging receipt of evaluation events
message PushEvaluationEventsResponse {
  string message_id = 1;
  int32 processed_count = 2;
}

// Metric tracking for experiments and analytics
message MetricEvent {
  string metric_key = 1;
  string feature_key = 2;
  string environment_id = 3;
  string user_context = 4;
  string variant = 5;
  double value = 6;
  string metadata = 7; // JSON string
  int64 timestamp_unix_ms = 8;
}

message TrackMetricRequest {
  repeated MetricEvent events = 1;
  string client_id = 2;
  string client_secret = 3;
}

message TrackMetricResponse {
  int32 processed_count = 1;
}

// Cluster replication messages to fan out updates across backend instances.
message ClusterEvaluationEvent {
  string event_id = 1;
  string feature_key = 2;
  string environment_id = 3;
  string client_id = 4;
  int64 evaluated_at_unix_ms = 5;
  bool evaluation_result = 6;
  bool prior_assignment = 7;
  string user_context = 8;
}

message ClusterMessage {
  string node_id = 1;
  oneof payload {
    FeatureUpdate feature_update = 10;
    ClusterEvaluationEvent evaluation_event = 11;
  }
}

// Get client information by client credentials
message GetClientInfoRequest {
  string client_id = 1;
  string client_secret = 2;
}

message GetClientInfoResponse {
  string id = 1;
  string team_id = 2;
  string name = 3;
  string description = 4;
  bool enabled = 5;
  string client_type = 6; // "Web" or "Backend"
  repeated string web_origins = 7; // Only populated for Web clients
}

service FeatureEvaluation {
  rpc Evaluate(EvaluateRequest) returns (EvaluateResponse);
  rpc GetFeatureByKey(GetFeatureByKeyRequest) returns (GetFeatureByKeyResponse);
  rpc GetClientInfo(GetClientInfoRequest) returns (GetClientInfoResponse);
  rpc StreamUpdates(stream StreamRequest) returns (stream FeatureUpdate);
  // Edge pushes sticky user assignments via client-streaming
  rpc PushUserAssignments(stream UserFlagAssignment) returns (Ack);
  // Edge can fetch all persisted user assignments on connect/startup
  rpc ListUserAssignments(ListUserFlagAssignmentsRequest) returns (ListUserFlagAssignmentsResponse);
  // Edge pushes evaluation events periodically for analytics and tracking
  rpc PushEvaluationEvents(PushEvaluationEventsRequest) returns (PushEvaluationEventsResponse);
  // Track business metrics (conversion/numeric) for experiments
  rpc TrackMetrics(TrackMetricRequest) returns (TrackMetricResponse);
}
