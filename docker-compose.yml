services:
  # postgres_server:
  #   hostname: postgres_server
  #   image: postgres:16
  #   environment:
  #     - POSTGRES_PASSWORD=local123
  #     - POSTGRES_DB=feature_toggle
  #   ports:
  #     - "5433:5432"
  #   volumes:
  #     - postgres_data_v2:/var/lib/postgresql/data

  feature_toggle_backend:
    build:
      context: .
      dockerfile: feature-toggle-backend/Dockerfile
    environment:
      # Connect to PostgreSQL running on host machine (default port 5432)
      # Update the credentials below to match your host PostgreSQL setup
      - DATABASE_URL=postgres://postgres:root123@host.docker.internal:5432/feature_toggle_k8s
    # depends_on:
    #   - postgres_server
    ports:
      - "8080:8080"
    restart: unless-stopped
    # Uncomment the following line to mount your own config.toml
    # volumes:
    #   - ./your-config.toml:/app/config/config.toml:ro

  feature_edge_server:
    build:
      context: .
      dockerfile: feature-edge-server/Dockerfile
    environment:
      - EDGE_BACKEND_GRPC=http://feature_toggle_backend:50051
      - EDGE_HTTP_ADDR=0.0.0.0:8081
      - EDGE_CLIENT_ID=a1b2c3d4-0000-4000-8000-000000000001
      - EDGE_CLIENT_SECRET=TEST_WEB_KEY_1
    depends_on:
      - feature_toggle_backend
    ports:
      - "8081:8081"
    restart: unless-stopped
    volumes:
      - ./feature-edge-server/config.toml:/app/config.toml:ro
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
# Volumes section can be removed if not using containerized PostgreSQL
# volumes:
#   postgres_data_v2:
